name: RAG Evaluation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check quality gate
        run: |
          python -c "
          import json, sys
          with open('eval/ragas_report.json') as f:
              report = json.load(f)
          threshold = 0.75
          failed = []
          for metric in ['faithfulness', 'context_recall']:
              score = report.get(metric, 0)
              print(metric + ': ' + str(score))
              if score < threshold:
                  failed.append(metric)
          if failed:
              print('FAILED metrics: ' + str(failed))
              sys.exit(1)
          else:
              print('All critical metrics passed.')
          "